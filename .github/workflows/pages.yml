name: Deploy dashboard to pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  schedule:
    # Runs every day at 12:00 PM UTC
    - cron: 0 12 * * *

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job since we're just deploying
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check if data refresh needed
        id: check
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "refresh_needed=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            echo "refresh_needed=true" >> $GITHUB_OUTPUT
          else
            non_static=$(git diff --name-only ${{ github.event.before }} HEAD | grep -vc '^static/' || true)
            [ "$non_static" -gt 0 ] && echo "refresh_needed=true" >> $GITHUB_OUTPUT || echo "refresh_needed=false" >> $GITHUB_OUTPUT
          fi
      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - name: Import data
        if: steps.check.outputs.refresh_needed == 'true'
        run: |
          mkdir -p static/data
          cargo run --release -- aggregate -o static/data 2>&1 | tee static/data/import-log.txt
      - name: Mirror existing artifact data
        if: steps.check.outputs.refresh_needed == 'false'
        run: |
          mkdir -p static/data
          curl -sf https://mozilla.github.io/use-counters/data/import-log.txt -o static/data/import-log.txt
          echo "--- $(date -u +"%Y-%m-%d %H:%M:%S UTC") ---" | tee -a static/data/import-log.txt
          cargo run --release -- artifact -o static/data 2>&1 | tee -a static/data/import-log.txt
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "static/"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
